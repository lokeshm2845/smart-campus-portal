<div>
    <h2 style="margin-bottom: 2rem;">Faculty Panel</h2>

    <div class="module-section">
        <h3>Assigned Courses</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Course ID</th>
                        <th>Course Name</th>
                        <th>Credits</th>
                        <th>Department</th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-repeat="c in courses">
                        <td>{{c.course_id}}</td>
                        <td>{{c.course_name}}</td>
                        <td>{{c.credits}}</td>
                        <td>{{c.department}}</td>
                    </tr>
                    <tr ng-if="courses.length === 0">
                        <td colspan="4">No assigned courses.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
        <div class="module-section">
            <h3>Mark Attendance</h3>
            <form name="attendanceForm" ng-submit="markAttendance()" novalidate>
                <div class="form-group">
                    <label>Student ID</label>
                    <input type="text" ng-model="attRecord.student_id" required>
                </div>
                <div class="form-group">
                    <label>Course</label>
                    <select ng-model="attRecord.course_id" ng-options="c.course_id as (c.course_name + ' (' + c.course_id + ')') for c in courses" required>
                        <option value="">Select Course</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select ng-model="attRecord.status" required>
                        <option value="">Select Status</option>
                        <option value="Present">Present</option>
                        <option value="Absent">Absent</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-small" ng-disabled="attendanceForm.$invalid">Submit Attendance</button>
            </form>
        </div>

        <div class="module-section">
            <h3>Enter Marks</h3>
            <form name="marksForm" ng-submit="enterMarks()" novalidate>
                <div class="form-group">
                    <label>Student ID</label>
                    <input type="text" ng-model="markRecord.student_id" required>
                </div>
                <div class="form-group">
                    <label>Course</label>
                    <select ng-model="markRecord.course_id" ng-options="c.course_id as (c.course_name + ' (' + c.course_id + ')') for c in courses" required>
                        <option value="">Select Course</option>
                    </select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Internal</label>
                        <input type="number" ng-model="markRecord.internal" max="40" required>
                    </div>
                    <div class="form-group">
                        <label>External</label>
                        <input type="number" ng-model="markRecord.external" max="60" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Grade</label>
                    <input type="text" ng-model="markRecord.grade" required>
                </div>
                <button type="submit" class="btn btn-small" ng-disabled="marksForm.$invalid">Submit Marks</button>
            </form>
        </div>
    </div>

    <!-- Live Assignments Creation Module -->
    <div class="module-section" style="margin-top: 2rem;">
        <h3>Deploy New Assignment</h3>
        <p style="font-size: 0.85rem; color: var(--text-light); margin-bottom: 1rem;">Push task requirements directly to student dashboards.</p>
        <form name="assignmentForm" ng-submit="createAssignment()" novalidate>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Course</label>
                    <select ng-model="newAssignment.course_id" ng-options="c.course_id as (c.course_name + ' (' + c.course_id + ')') for c in courses" required>
                        <option value="">Select Course</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" ng-model="newAssignment.title" required>
                </div>
            </div>
            <div class="form-group">
                <label>Description / Guidelines</label>
                <textarea ng-model="newAssignment.description" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" ng-model="newAssignment.due_date" required>
            </div>
            <button type="submit" class="btn btn-small" style="background: var(--primary-color)" ng-disabled="assignmentForm.$invalid">Deploy to Class</button>
        </form>
    </div>
</div>
