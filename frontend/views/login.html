<div class="login-container">
    <div class="login-card">
        <h2>Portal Login</h2>
        <form name="loginForm" ng-submit="login()" novalidate>
            <div class="form-group">
                <label>User ID</label>
                <input type="text" ng-model="credentials.user_id" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" ng-model="credentials.password" required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select ng-model="credentials.role" required>
                    <option value="Student">Student</option>
                    <option value="Faculty">Faculty</option>
                    <option value="HOD">HOD</option>
                    <option value="Dean">Dean</option>
                    <option value="Associate Dean">Associate Dean</option>
                    <option value="Director">Director</option>
                    <option value="Librarian">Librarian</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <span class="error-message" ng-show="errorMsg">{{errorMsg}}</span>
            <button type="submit" class="btn" ng-disabled="loginForm.$invalid" style="margin-top: 1rem;">Login</button>
        </form>
    </div>
</div>
