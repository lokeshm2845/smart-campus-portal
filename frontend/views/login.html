<div class="login-container">
    <div class="login-card animate-slide">
        <div class="logo-area">
            <div style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;">
                <i class="fa-solid fa-building-columns"></i>
            </div>
            <h2>Smart Campus Portal</h2>
            <p>Enter your credentials to access the ecosystem</p>
        </div>

        <form name="loginForm" ng-submit="login()">
            <div class="form-group">
                <label><i class="fa-solid fa-id-card"></i> University ID</label>
                <input type="text" ng-model="credentials.user_id" placeholder="Enter ID" required>
            </div>
            
            <div class="form-group">
                <label><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password" ng-model="credentials.password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-user-tag"></i> Login As</label>
                <select ng-model="credentials.role" required>
                    <option value="" disabled>-- Select Your Role --</option>
                    <option value="Admin">Administrator</option>
                    <option value="Student">Student</option>
                    <option value="Faculty">Faculty Member</option>
                    <option value="HOD">HOD</option>
                    <option value="Dean">Dean</option>
                    <option value="Associate Dean">Associate Dean</option>
                    <option value="Director">Director</option>
                    <option value="Librarian">Librarian</option>
                </select>
            </div>

            <p ng-if="errorMsg" class="badge badge-danger" style="margin-bottom: 1.5rem; display: block;">
                <i class="fa-solid fa-triangle-exclamation"></i> {{errorMsg}}
            </p>

            <button type="submit" class="btn">
                <span>Sign In to Portal</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

        <div style="margin-top: 2.5rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
            <p style="font-size: 0.75rem;">Trouble signing in? <a href="#" style="color: var(--primary-light); text-decoration: none;">Contact IT Support</a></p>
        </div>
    </div>
</div>
